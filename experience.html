<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Experience — Oliver Loree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div class="texture-bg"></div>
<div class="topo-lines"></div>
<div class="noise"></div>
<div class="vignette"></div>

<div class="nav-overlay" id="navOverlay"></div>
<nav class="site-nav">
  <a href="index.html" class="nav-logo">Oliver Loree</a>
  <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="archive.html">Archive</a>
    <a href="experience.html" style="color:var(--tan)">Experience</a>
  </div>
</nav>

<div class="archive-header reveal">
  <h1>Work <em>Experience</em></h1>
</div>

<div class="section-divider"><hr></div>

<div class="experience-grid" id="experienceContainer">
  <!-- Loaded dynamically -->
</div>

<footer class="site-footer">
  <span>&copy; 2026 Oliver Loree</span>
  <span>Georgia Institute of Technology</span>
</footer>

<script src="values.js"></script>
<script src="shared.js"></script>
<script>
  const experiences = getWorkExperience();
  const container = document.getElementById('experienceContainer');

  experiences.forEach((job, i) => {
    const card = document.createElement('div');
    card.className = 'experience-card reveal';
    card.style.transitionDelay = `${0.1 + i * 0.08}s`;
    if (job.link) card.style.cursor = 'pointer';
    if (job.link) card.onclick = () => window.location.href = job.link;

    const imageContent = job.heroImage
      ? `<img src="${job.heroImage}" alt="${job.company}">`
      : `<div class="placeholder">${job.company.charAt(0)}</div>`;

    const bullets = job.highlights && job.highlights.length
      ? `<ul>${job.highlights.map(h => `<li>${h}</li>`).join('')}</ul>` : '';

    card.innerHTML = `
      <div class="experience-card-image">
        ${imageContent}
        <div class="experience-card-overlay">
          <h3>${job.company}</h3>
          <div class="role">${job.role}</div>
          <div class="dates">${job.dates}</div>
        </div>
      </div>
      <div class="experience-card-body">
        ${job.blurb}${bullets}
      </div>
    `;
    container.appendChild(card);
  });
</script>
</body>
</html>
