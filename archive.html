<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Archive — Oliver Loree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<!-- Full background layers -->
<div class="texture-bg"></div>
<div class="topo-lines"></div>
<div class="noise"></div>
<div class="vignette"></div>

<div class="nav-overlay" id="navOverlay"></div>
<nav class="site-nav">
  <a href="index.html" class="nav-logo">Oliver Loree</a>
  <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="archive.html" style="color:var(--tan)">Archive</a>
    <a href="experience.html">Experience</a>
  </div>
</nav>

<div class="archive-header reveal">
  <h1>Project <em>Archive</em></h1>
</div>

<div class="section-divider"><hr></div>

<div class="archive-grid" id="projectsContainer">
  <!-- Loaded dynamically from values.js -->
</div>

<footer class="site-footer">
  <span>&copy; 2026 Oliver Loree</span>
  <span>Georgia Institute of Technology</span>
</footer>

<script src="values.js"></script>
<script src="shared.js"></script>
<script>
  const allProjects = getAllProjects();
  const container = document.getElementById('projectsContainer');

  allProjects.forEach((project, i) => {
    const card = document.createElement('a');
    card.href = project.link;
    card.className = 'archive-card reveal';
    card.style.transitionDelay = `${0.1 + i * 0.08}s`;
    card.innerHTML = `
      <div class="archive-card-image">
        <img src="${project.heroImage}" alt="${project.name}">
      </div>
      <div class="archive-card-body">
        <h3>${project.name}</h3>
        <div class="archive-card-date">${project.date}</div>
        <p>${project.blurb}</p>
        <div class="archive-card-tags">
          ${project.skills.map(s => `<span class="archive-card-tag">${s}</span>`).join('')}
        </div>
      </div>
    `;
    container.appendChild(card);
  });
</script>
</body>
</html>
